<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <script>
      (() => {
        const retryParam = '__asset_retry';
        const currentUrl = new URL(window.location.href);
        const retryTime = Number(currentUrl.searchParams.get(retryParam));
        const recentlyRetried = Number.isFinite(retryTime) && Date.now() - retryTime < 30_000;
        let retryScheduled = false;

        window.addEventListener(
          'error',
          (event) => {
            const element = event.target;
            const assetUrl =
              element instanceof HTMLScriptElement
                ? element.src
                : element instanceof HTMLLinkElement && element.rel === 'stylesheet'
                  ? element.href
                  : '';

            if (!assetUrl || retryScheduled || recentlyRetried) return;

            const parsedAssetUrl = new URL(assetUrl, window.location.href);
            if (parsedAssetUrl.origin !== window.location.origin || !parsedAssetUrl.pathname.startsWith('/assets/')) {
              return;
            }

            retryScheduled = true;
            window.setTimeout(() => {
              currentUrl.searchParams.set(retryParam, String(Date.now()));
              window.location.replace(currentUrl.toString());
            }, 1_000);
          },
          true,
        );
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇩🇪</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Berlin Car Wash Patrol | German Luxury Car Care Qatar</title>
    <meta name="description" content="Reshaping Qatar's car wash industry with certified German detailing expertise, premium German products, and luxury care." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,600;0,700;0,900;1,400&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#08080a] text-gray-100 font-sans antialiased selection:bg-amber-500 selection:text-black">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
